<!DOCTYPE html>
<html>
<head>
    <title>minipad...</title>
    <link rel="stylesheet" type="text/css" href="theme/style.css">
    <link rel="icon" type="image/x-icon" href="images/icon.svg">
    <style>
        .pad-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
        }

        #pad {
            width: 100%;
            height: 300px;
            font-family: monospace;
            line-height: 22px;
            position: relative;
            background: transparent;
            z-index: 2;
            resize: vertical;
        }

        .line-highlight {
            position: absolute;
            left: 0;
            right: 0;
            height: 22px;
            background: rgba(255, 255, 0, 0.3);
            animation: blink 1s infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>

<body>

    <div class="pad-wrapper">
        <div id="lineHighlight" class="line-highlight"></div>
        <textarea id="pad" autofocus>minipad...</textarea>
    </div>

    <button onclick="downloadText()">Save as .txt</button>
    <button id="importBtn" onclick="document.getElementById('fileInput').click()">Import</button>
    <button id="themeToggle">🌙 Dark</button>

    <input type="file" id="fileInput" accept=".txt" style="display:none">

    <script>
        const textarea = document.getElementById("pad");
        const fileInput = document.getElementById("fileInput");
        const themeToggle = document.getElementById("themeToggle");
        const highlight = document.getElementById("lineHighlight");

        const CONTENT_COOKIE = "minipadContent";
        const THEME_COOKIE = "minipadTheme";

        const lineHeight = 22;

        function updateActiveLine() {
            const cursorPos = textarea.selectionStart;
            const textBefore = textarea.value.substring(0, cursorPos);
            const lineNumber = textBefore.split("\n").length - 1;
            highlight.style.top =
                (lineNumber * lineHeight - textarea.scrollTop) + "px";
        }

        textarea.addEventListener("keyup", updateActiveLine);
        textarea.addEventListener("click", updateActiveLine);
        textarea.addEventListener("scroll", updateActiveLine);

        function saveToCookie() {
            const text = encodeURIComponent(textarea.value);
            document.cookie = CONTENT_COOKIE + "=" + text + "; path=/; max-age=31536000";
        }

        function loadFromCookie() {
            const cookies = document.cookie.split("; ");
            for (let c of cookies) {
                const [name, value] = c.split("=");
                if (name === CONTENT_COOKIE) {
                    textarea.value = decodeURIComponent(value);
                    return;
                }
            }
        }

        function downloadText() {
            const blob = new Blob([textarea.value], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "minipad.txt";
            link.click();
            URL.revokeObjectURL(link.href);
        }

        fileInput.addEventListener("change", function () {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                textarea.value = e.target.result;
                saveToCookie();
                updateActiveLine();
            };
            reader.readAsText(file);
        });

        textarea.addEventListener("input", function() {
            saveToCookie();
            updateActiveLine();
        });

        function setTheme(theme) {
            document.body.className = theme;
            document.cookie = THEME_COOKIE + "=" + theme + "; path=/; max-age=31536000";
            themeToggle.textContent = theme === "dark" ? "☀ Light" : "🌙 Dark";
        }

        function loadTheme() {
            const cookies = document.cookie.split("; ");
            for (let c of cookies) {
                const [name, value] = c.split("=");
                if (name === THEME_COOKIE) {
                    setTheme(value);
                    return;
                }
            }
            setTheme("light");
        }

        themeToggle.addEventListener("click", function () {
            const isDark = document.body.classList.contains("dark");
            setTheme(isDark ? "light" : "dark");
        });

        window.addEventListener("DOMContentLoaded", function() {
            loadFromCookie();
            loadTheme();
            updateActiveLine();
        });
    </script>

</body>
</html>
