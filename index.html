<!DOCTYPE html>
<!-- By Rhhen122 -->
<html>
<head>
    <title>minipad...</title>
    <link rel="stylesheet" type="text/css" href="theme/style.css">
    <link rel="icon" type="image/x-icon" href="images/icon.svg">
</head>

<body>

    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <button id="logoBtn" class="top-left" title="About minipad">
        <img src="images/icon.svg" alt="minipad logo">
    </button>

    <div id="popup" class="popup-modal">
        <div class="popup-content">
            <h1>minipad</h1>
            <p>a simple tiny note taking app...</p>
            <div style="margin-top: 16px; text-align: center;">
                <a href="https://github.com/rhhen122/minipad" target="_blank" style="color: inherit; text-decoration: none;">
                    <button>GitHub</button>
                </a>
            </div>
            <button id="closePopup" class="close-btn">Close</button>
        </div>
    </div>

    <textarea id="pad" autofocus>minipad...</textarea>

    <div class="bottom-bar">
        <button onclick="downloadText()">Export</button>
        <button id="importBtn" onclick="document.getElementById('fileInput').click()">Import</button>
        <button id="alignToggle">Align Left</button>
        <button id="themeToggle">Dark</button>
    </div>

    <div class="size-controls">
        <button id="sizeIncrease" title="Increase text size">+</button>
        <button id="sizeDecrease" title="Decrease text size">−</button>
        <button id="sizeReset" title="Reset text size">↺</button>
    </div>

    <div class="commit-info">
        <span>Latest commit: </span><a href="https://github.com/rhhen122/minipad/commit/"><span id="commit-message">Loading...</span></a>
    </div>

    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <script src="script/main.js"></script>
</body>
</html>
