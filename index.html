<!DOCTYPE html>
<!-- By Rhhen122 -->
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>minipad – lightweight note-taking</title>
    <meta name="description" content="A simple, browser-based text editor. Notes stored only in your browser. No account, no server.">
    <!-- Open Graph (Discord, Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="minipad – lightweight note-taking">
    <meta property="og:description" content="A simple, browser-based text editor. Notes stored only in your browser. No account, no server.">
    <meta property="og:image" content="https://github.com/rhhen122/minipad/raw/main/images/icon.svg">
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="minipad – lightweight note-taking">
    <meta name="twitter:description" content="A simple, browser-based text editor. Notes stored only in your browser. No account, no server.">
    <meta name="twitter:image" content="https://github.com/rhhen122/minipad/raw/main/images/icon.svg">
    <link rel="stylesheet" type="text/css" href="theme/style.css">
    <link rel="icon" type="image/x-icon" href="images/icon.svg">
</head>

<body>

    <div id="loading" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <button id="logoBtn" class="top-left" title="About minipad">
        <img src="images/icon.svg" alt="minipad logo">
    </button>

    <div id="popup" class="popup-modal">
        <div class="popup-content">
            <h1>minipad</h1>
            <p>a simple tiny note taking app...</p>
            <div style="margin-top: 16px; text-align: center;">
                <a href="https://github.com/rhhen122/minipad" target="_blank" style="color: inherit; text-decoration: none;">
                    <button>GitHub</button>
                </a>
            </div>
            <button id="closePopup" class="close-btn">Close</button>
        </div>
    </div>

    <textarea id="pad" autofocus>minipad...</textarea>

    <div class="bottom-bar">
        <button id="notesBtn">Notes</button>
        <button id="exportBtn">Export</button>
        <button id="importBtn">Import</button>
        <button id="alignToggle">Align Left</button>
        <button id="themeToggle">Dark</button>
    </div>

    <div id="notesPanel" class="notes-panel">
        <div class="notes-panel-header">
            <h2>Notes</h2>
            <button id="notesPanelClose" class="close-btn" title="Close">×</button>
        </div>
        <p class="notes-hint">Stored only in this browser. Nothing is sent to the server.</p>
        </div>
        <button id="newNoteBtn" class="new-note-btn">+ New note</button>
        <ul id="notesList" class="notes-list"></ul>
    </div>

    <div class="size-controls">
        <button id="sizeIncrease" title="Increase text size">+</button>
        <button id="sizeDecrease" title="Decrease text size">−</button>
        <button id="sizeReset" title="Reset text size">↺</button>
    </div>

    <div class="commit-info">
        <span>Latest commit: </span><a href="https://github.com/rhhen122/minipad/commit/"><span id="commit-message">Loading...</span></a>
    </div>

    <input type="file" id="fileInput" accept=".txt" style="display:none">
    <script type="module" src="script/main.js"></script>
</body>
</html>
