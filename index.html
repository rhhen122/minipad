<!DOCTYPE html>
<html>
<head>
    <title>minipad...</title>
    <link id="themeStylesheet" rel="stylesheet" type="text/css" href="theme/light.css">
</head>

<body>
    <textarea id="pad" autofocus>minipad...</textarea>

    <button onclick="downloadText()">Save as .txt</button>
    <button id="importBtn" onclick="document.getElementById('fileInput').click()">Import</button>
    <button id="themeToggle">🌙 Dark</button>

    <input type="file" id="fileInput" accept=".txt" style="display:none">

    <script>
        const textarea = document.getElementById("pad");
        const fileInput = document.getElementById("fileInput");
        const themeToggle = document.getElementById("themeToggle");
        const themeStylesheet = document.getElementById("themeStylesheet");

        const CONTENT_COOKIE = "minipadContent";
        const THEME_COOKIE = "minipadTheme";

        /* =========================
           TEXT SAVE / LOAD
        ========================== */

        function saveToCookie() {
            const text = encodeURIComponent(textarea.value);
            document.cookie = CONTENT_COOKIE + "=" + text + "; path=/; max-age=31536000";
        }

        function loadFromCookie() {
            const cookies = document.cookie.split("; ");
            for (let c of cookies) {
                const [name, value] = c.split("=");
                if (name === CONTENT_COOKIE) {
                    textarea.value = decodeURIComponent(value);
                    return;
                }
            }
        }

        function downloadText() {
            const blob = new Blob([textarea.value], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "minipad.txt";
            link.click();
            URL.revokeObjectURL(link.href);
        }

        fileInput.addEventListener("change", function () {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                textarea.value = e.target.result;
                saveToCookie();
            };
            reader.readAsText(file);
        });

        textarea.addEventListener("input", saveToCookie);

        /* =========================
           THEME TOGGLE (SEPARATE FILES)
        ========================== */

        function setTheme(theme) {
            themeStylesheet.href = "theme/" + theme + ".css";
            document.cookie = THEME_COOKIE + "=" + theme + "; path=/; max-age=31536000";
            themeToggle.textContent = theme === "dark" ? "☀ Light" : "🌙 Dark";
        }

        function loadTheme() {
            const cookies = document.cookie.split("; ");
            for (let c of cookies) {
                const [name, value] = c.split("=");
                if (name === THEME_COOKIE) {
                    setTheme(value);
                    return;
                }
            }
            setTheme("light");
        }

        themeToggle.addEventListener("click", function () {
            const currentTheme = themeStylesheet.href.includes("dark") ? "dark" : "light";
            const newTheme = currentTheme === "dark" ? "light" : "dark";
            setTheme(newTheme);
        });

        /* =========================
           INIT
        ========================== */

        window.addEventListener("DOMContentLoaded", function() {
            loadFromCookie();
            loadTheme();
        });
    </script>
</body>
</html>
